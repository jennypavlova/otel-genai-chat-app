services:
  # ── EDOT Collector — self-managed equivalent of Elastic Cloud managed OTLP ───
  #
  # Replicates managed OTLP locally:
  #   - Receives OTLP from the app on ports 4317 (gRPC) and 4318 (HTTP)
  #   - Stores traces in traces-generic.otel-* (OTel-native, gen_ai.* as dotted names)
  #   - elasticapm connector generates service_transaction metrics → Kibana APM UI
  #
  # App config: OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318
  #             OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
  edot-collector:
    image: docker.elastic.co/elastic-agent/elastic-otel-collector:9.4.2
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./edot-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    environment:
      - ELASTIC_ES_ENDPOINT=${ELASTIC_ES_ENDPOINT:-http://host.docker.internal:9200}
      - ELASTIC_ES_USER=${ELASTIC_ES_USER:-elastic}
      - ELASTIC_ES_PASSWORD=${ELASTIC_ES_PASSWORD:-changeme}
      - ELASTIC_ES_API_KEY=${ELASTIC_ES_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      disable: true
