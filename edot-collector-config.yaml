# EDOT Collector — self-managed equivalent of the Elastic Cloud managed OTLP endpoint.
#
# Image: docker.elastic.co/elastic-agent/elastic-otel-collector:9.4.2
#
# Why EDOT Collector instead of APM Server:
#   - APM Server always ECS-translates OTLP → labels.gen_ai_* (underscores, no dots)
#   - EDOT Collector writes OTel-native → attributes.gen_ai.* (dotted names preserved)
#   - The elasticapm connector generates service_transaction metrics so Kibana APM
#     Service Inventory and latency charts work — same as managed OTLP on Cloud
#
# Data path:
#   App SDK (port 4317 gRPC / 4318 HTTP)
#     → elasticapm processor  (enriches spans with Elastic APM attributes)
#     → elasticsearch/otel    (traces-generic.otel-*, OTel-native format)
#     → elasticapm connector  (generates service_transaction / span / service-map metrics)
#         → metrics/aggregated-apm pipeline
#             → elasticsearch/otel  (metrics-*.otel-* for APM UI charts)

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

connectors:
  elasticapm: {}

processors:
  elasticapm: {}

  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  batch:
    timeout: 5s
    send_batch_size: 512

exporters:
  elasticsearch/otel:
    endpoints:
      - ${env:ELASTIC_ES_ENDPOINT}
    user: ${env:ELASTIC_ES_USER}
    password: ${env:ELASTIC_ES_PASSWORD}
    # api_key: ${env:ELASTIC_ES_API_KEY}   # uncomment for Cloud / API key auth
    mapping:
      mode: otel          # routes to traces-generic.otel-* (NOT traces-apm-*)
    tls:
      insecure_skip_verify: true

  debug:
    verbosity: basic

service:
  pipelines:
    # Traces: enrich → export OTel-native + generate APM metrics
    traces:
      receivers: [otlp]
      processors: [memory_limiter, elasticapm, batch]
      exporters: [elasticsearch/otel, elasticapm]

    # Metrics from SDK (token usage histograms, latency, etc.)
    metrics/fromsdk:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [elasticsearch/otel]

    # APM aggregated metrics generated by the connector (service_transaction etc.)
    metrics/aggregated-apm:
      receivers: [elasticapm]
      processors: []
      exporters: [elasticsearch/otel]

    # Logs (span events with message content land here)
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [elasticsearch/otel, elasticapm]
