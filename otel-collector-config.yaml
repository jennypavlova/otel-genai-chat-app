# Vanilla OTel Collector config — kept for reference / debugging only.
#
# The primary local pipeline uses edot-collector-config.yaml (EDOT Collector),
# which adds the elasticapm connector for service_transaction metrics so Kibana
# APM Service Inventory works.
#
# Use this config only when you need:
#   - Span inspection via zpages: http://localhost:55679/debug/tracez
#   - A minimal OTLP → ES pipeline without any Elastic-specific components
#
# NOTE: this path generates NO service_transaction metrics, so the service
# will have limited APM UI support (no throughput/latency charts).
#
# ES credentials are injected from docker-compose environment variables.

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  resourcedetection:
    detectors: [env, system]
    timeout: 2s
    override: false

  resource:
    attributes:
      - key: deployment.environment
        value: development
        action: insert

  batch:
    timeout: 5s
    send_batch_size: 512

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777
  zpages:
    endpoint: 0.0.0.0:55679

exporters:
  # OTel-native: gen_ai.* attributes stored with their original dotted names.
  elasticsearch:
    endpoints:
      - ${env:ELASTIC_ES_ENDPOINT}
    user: ${env:ELASTIC_ES_USER}
    password: ${env:ELASTIC_ES_PASSWORD}
    # api_key: ${env:ELASTIC_ES_API_KEY}   # uncomment for Cloud
    mapping:
      mode: otel
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 100
    tls:
      insecure_skip_verify: true

  debug:
    verbosity: detailed

service:
  extensions: [health_check, pprof, zpages]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, resource, batch]
      exporters: [elasticsearch, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, resource, batch]
      exporters: [elasticsearch, debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, resource, batch]
      exporters: [elasticsearch, debug]
