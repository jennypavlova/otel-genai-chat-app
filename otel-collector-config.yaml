# OTel Collector configuration for local development.
# Receives OTLP data from the Python backend and forwards it to a local
# Elasticsearch instance so traces appear in Kibana APM.
#
# ES credentials are injected from docker-compose environment variables —
# no secrets are stored in this file.

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  batch:
    timeout: 5s
    send_batch_size: 512

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777
  zpages:
    endpoint: 0.0.0.0:55679

exporters:
  # Elasticsearch exporter — sends traces, metrics and logs using the OTel
  # mapping mode so data appears correctly in Kibana APM / Logs / Metrics.
  #
  # Auth: set ONE of the two options in your .env:
  #   Option A (local basic auth): ELASTIC_ES_USER / ELASTIC_ES_PASSWORD
  #   Option B (Elastic Cloud / API key): ELASTIC_ES_API_KEY
  elasticsearch:
    endpoints:
      - ${env:ELASTIC_ES_ENDPOINT}
    user: ${env:ELASTIC_ES_USER}
    password: ${env:ELASTIC_ES_PASSWORD}
    # api_key: ${env:ELASTIC_ES_API_KEY}   # uncomment and remove user/password for Cloud
    mapping:
      mode: otel          # critical: tells ES to use OTel index templates
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 100
    tls:
      insecure_skip_verify: true  # safe for local self-signed certs; remove for prod

  # Human-readable debug output (useful to verify data flowing through)
  debug:
    verbosity: basic

service:
  extensions: [health_check, pprof, zpages]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [elasticsearch, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [elasticsearch, debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [elasticsearch, debug]
